<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Us — Example Form</title>
<style>
  /* ========================================================
     Clean, modern contact form.  Drop into any static site.
     No dependencies.  Responsive out of the box.
     ======================================================== */
  :root {
    --bg:       #f8f9fb;
    --card-bg:  #ffffff;
    --text:     #1a1a2e;
    --muted:    #6b7280;
    --border:   #e5e7eb;
    --accent:   #5b8af7;
    --accent-h: #4a7ae0;
    --success:  #059669;
    --error:    #dc2626;
    --radius:   8px;
    --shadow:   0 1px 3px rgba(0,0,0,0.06), 0 4px 12px rgba(0,0,0,0.04);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 20px;
  }

  .form-wrapper {
    width: 100%;
    max-width: 480px;
    background: var(--card-bg);
    border-radius: 12px;
    box-shadow: var(--shadow);
    padding: 40px 36px;
  }

  .form-wrapper h2 {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.02em;
    margin-bottom: 4px;
  }
  .form-wrapper p.subtitle {
    color: var(--muted);
    font-size: 14px;
    margin-bottom: 28px;
  }

  label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    margin-bottom: 5px;
    color: var(--text);
  }

  input[type="text"],
  input[type="email"],
  textarea {
    width: 100%;
    padding: 11px 14px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    font-size: 14px;
    font-family: inherit;
    color: var(--text);
    background: #fafbfc;
    transition: border-color 0.15s ease, box-shadow 0.15s ease;
    margin-bottom: 16px;
  }
  input:focus,
  textarea:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(91, 138, 247, 0.12);
    background: #fff;
  }
  textarea { resize: vertical; min-height: 110px; }

  button {
    width: 100%;
    padding: 12px 20px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: var(--radius);
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s ease, transform 0.08s ease;
  }
  button:hover { background: var(--accent-h); }
  button:active { transform: scale(0.98); }
  button:disabled {
    opacity: 0.6;
    cursor: not-allowed;
    transform: none;
  }

  .form-message {
    margin-top: 16px;
    padding: 10px 14px;
    border-radius: var(--radius);
    font-size: 14px;
    display: none;
  }
  .form-message.success {
    display: block;
    background: #ecfdf5;
    color: var(--success);
    border: 1px solid #a7f3d0;
  }
  .form-message.error {
    display: block;
    background: #fef2f2;
    color: var(--error);
    border: 1px solid #fecaca;
  }
  .form-message.loading {
    display: block;
    background: #eff6ff;
    color: var(--accent);
    border: 1px solid #bfdbfe;
  }

  /* Hidden honeypot — no human will see or fill this */
  .gotcha-field {
    position: absolute;
    left: -9999px;
    opacity: 0;
    height: 0;
    width: 0;
    overflow: hidden;
  }

  /* Responsive */
  @media (max-width: 500px) {
    .form-wrapper { padding: 28px 20px; }
  }
</style>
</head>
<body>

<div class="form-wrapper">
  <h2>Get in touch</h2>
  <p class="subtitle">Fill out the form and we'll get back to you within 24 hours.</p>

  <form id="contact-form" novalidate>

    <!-- Honeypot field — invisible to humans, irresistible to bots -->
    <div class="gotcha-field" aria-hidden="true">
      <input type="text" name="_gotcha" tabindex="-1" autocomplete="off">
    </div>

    <label for="name">Name</label>
    <input type="text" id="name" name="name" placeholder="Jane Smith" autocomplete="name">

    <label for="email">Email <span style="color:var(--error)">*</span></label>
    <input type="email" id="email" name="email" placeholder="jane@example.com" required autocomplete="email">

    <label for="message">Message <span style="color:var(--error)">*</span></label>
    <textarea id="message" name="message" placeholder="Tell us about your project..." required></textarea>

    <!-- Hidden field: which page was this submitted from -->
    <input type="hidden" name="source" value="">

    <button type="submit" id="submit-btn">Send Message</button>

    <div class="form-message" id="form-message"></div>
  </form>
</div>

<script>
// ================================================================
//  FORM SUBMISSION LOGIC
//  Replace YOUR_SCRIPT_URL below with your deployed web app URL.
// ================================================================

var SCRIPT_URL = 'YOUR_SCRIPT_URL';

// Auto-fill the source field with the current page URL.
(function() {
  var sourceField = document.querySelector('[name="source"]');
  if (sourceField) sourceField.value = window.location.href;
})();

var form = document.getElementById('contact-form');
var msgEl = document.getElementById('form-message');
var btn   = document.getElementById('submit-btn');

function showMessage(text, type) {
  msgEl.textContent = text;
  msgEl.className = 'form-message ' + type;
}

form.addEventListener('submit', async function(e) {
  e.preventDefault();

  // Basic client-side validation.
  var email   = form.email.value.trim();
  var message = form.message.value.trim();

  if (!email || !message) {
    showMessage('Please fill in both email and message.', 'error');
    return;
  }

  // Disable button while submitting.
  btn.disabled = true;
  btn.textContent = 'Sending...';
  showMessage('Sending your message...', 'loading');

  try {
    var res = await fetch(SCRIPT_URL, {
      method: 'POST',
      body: JSON.stringify({
        name:    form.name.value.trim(),
        email:   email,
        message: message,
        source:  form.source.value || window.location.href,
        _gotcha: form._gotcha.value     // bots fill hidden fields
      }),
      headers: { 'Content-Type': 'application/json' }
    });

    var json = await res.json();

    if (json.status === 'success') {
      showMessage('Message sent! We\'ll be in touch soon.', 'success');
      form.reset();
      // Re-set source after reset.
      var sf = document.querySelector('[name="source"]');
      if (sf) sf.value = window.location.href;
    } else {
      showMessage(json.message || 'Something went wrong. Please try again.', 'error');
    }
  } catch (err) {
    showMessage('Network error. Please check your connection and try again.', 'error');
  }

  btn.disabled = false;
  btn.textContent = 'Send Message';
});
</script>

</body>
</html>
